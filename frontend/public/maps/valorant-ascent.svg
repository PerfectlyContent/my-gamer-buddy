<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .label { font-family: 'Courier New', monospace; font-size: 14px; fill: #ffffff; text-anchor: middle; font-weight: bold; }
      .sublabel { font-family: 'Courier New', monospace; font-size: 10px; fill: #ff4655; text-anchor: middle; }
      .site { fill: #ff4655; opacity: 0.15; stroke: #ff4655; stroke-width: 2; stroke-opacity: 0.4; }
      .wall { stroke: #334; stroke-width: 3; fill: none; }
      .area { fill: #1a1a2e; stroke: #252545; stroke-width: 1; }
      .spawn { fill: #ff4655; opacity: 0.08; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0f0f1a"/>
  <rect x="100" y="80" width="824" height="864" rx="12" fill="#141428" stroke="#252545" stroke-width="2"/>

  <!-- Grid -->
  <g opacity="0.15" stroke="#333366" stroke-width="0.5">
    <line x1="100" y1="300" x2="924" y2="300"/><line x1="100" y1="512" x2="924" y2="512"/>
    <line x1="100" y1="724" x2="924" y2="724"/>
    <line x1="300" y1="80" x2="300" y2="944"/><line x1="512" y1="80" x2="512" y2="944"/>
    <line x1="724" y1="80" x2="724" y2="944"/>
  </g>

  <!-- A Site -->
  <rect x="650" y="200" width="200" height="180" rx="8" class="site"/>
  <text x="750" y="285" class="label" filter="url(#glow)">A SITE</text>
  <text x="750" y="305" class="sublabel">Plant Zone</text>

  <!-- B Site -->
  <rect x="180" y="200" width="200" height="180" rx="8" class="site"/>
  <text x="280" y="285" class="label" filter="url(#glow)">B SITE</text>
  <text x="280" y="305" class="sublabel">Plant Zone</text>

  <!-- Mid -->
  <rect x="400" y="380" width="224" height="200" rx="8" fill="#1a1a30" stroke="#ff4655" stroke-width="1" stroke-opacity="0.2"/>
  <text x="512" y="475" class="label" filter="url(#glow)">MID</text>
  <text x="512" y="495" class="sublabel">Market / Catwalk</text>

  <!-- Corridors -->
  <rect x="380" y="200" width="40" height="180" fill="#1a1a2e" stroke="#252545" stroke-width="1"/>
  <rect x="604" y="200" width="46" height="180" fill="#1a1a2e" stroke="#252545" stroke-width="1"/>

  <!-- Defender Spawn -->
  <rect x="380" y="100" width="264" height="80" rx="8" class="spawn"/>
  <text x="512" y="148" class="sublabel">DEFENDER SPAWN</text>

  <!-- Attacker Spawn -->
  <rect x="380" y="780" width="264" height="80" rx="8" class="spawn"/>
  <text x="512" y="828" class="sublabel">ATTACKER SPAWN</text>

  <!-- A Main / A Long -->
  <rect x="700" y="480" width="120" height="260" rx="4" fill="#1a1a2e" stroke="#252545" stroke-width="1"/>
  <text x="760" y="620" class="sublabel" transform="rotate(-90, 760, 620)">A MAIN</text>

  <!-- B Main -->
  <rect x="200" y="480" width="120" height="260" rx="4" fill="#1a1a2e" stroke="#252545" stroke-width="1"/>
  <text x="260" y="620" class="sublabel" transform="rotate(-90, 260, 620)">B MAIN</text>

  <!-- Title -->
  <text x="512" y="40" font-family="'Courier New', monospace" font-size="24" fill="#ff4655" text-anchor="middle" font-weight="bold" filter="url(#glow)">ASCENT</text>
  <text x="512" y="60" font-family="'Courier New', monospace" font-size="11" fill="#666" text-anchor="middle">VALORANT — 45°26'BF'N, 12°20'Q'E</text>

  <!-- Compass -->
  <circle cx="880" cy="900" r="25" fill="none" stroke="#ff4655" stroke-width="1" opacity="0.4"/>
  <text x="880" y="885" font-family="'Courier New', monospace" font-size="10" fill="#ff4655" text-anchor="middle">N</text>
  <line x1="880" y1="890" x2="880" y2="910" stroke="#ff4655" stroke-width="1.5" opacity="0.6"/>
</svg>
