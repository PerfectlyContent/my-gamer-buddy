<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .district-label { font-family: 'Courier New', monospace; font-size: 14px; fill: #ffffff; text-anchor: middle; }
      .district-label-lg { font-family: 'Courier New', monospace; font-size: 18px; fill: #39ff14; text-anchor: middle; font-weight: bold; }
      .road { stroke: #39ff14; stroke-width: 1.5; fill: none; opacity: 0.6; }
      .road-main { stroke: #39ff14; stroke-width: 2.5; fill: none; opacity: 0.8; }
      .region-border { stroke: #39ff14; stroke-width: 1; fill: none; stroke-dasharray: 8,4; opacity: 0.4; }
      .water { fill: #00d4ff; opacity: 0.12; }
      .land { fill: #12121a; stroke: #39ff14; stroke-width: 0.5; opacity: 0.8; }
      .building-block { fill: #1a1a2e; stroke: #39ff14; stroke-width: 0.3; opacity: 0.6; }
      .poi-dot { fill: #39ff14; opacity: 0.8; }
      .mountain { fill: none; stroke: #555570; stroke-width: 1; opacity: 0.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="#0a0a0f"/>

  <!-- Outer border with glow -->
  <rect x="20" y="20" width="1160" height="1160" rx="16" ry="16" fill="none" stroke="#39ff14" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <rect x="24" y="24" width="1152" height="1152" rx="14" ry="14" fill="none" stroke="#39ff14" stroke-width="0.5" opacity="0.3"/>

  <!-- Ocean / Water areas -->
  <path d="M24,700 L24,1164 L400,1164 L380,1100 L300,1000 L250,900 L200,800 L150,750 L80,720 Z" class="water"/>
  <path d="M24,24 L24,500 L80,450 L100,380 L80,300 L60,200 L40,100 L24,24 Z" class="water"/>
  <path d="M24,500 L24,700 L80,720 L120,680 L100,600 L80,520 Z" class="water"/>
  <path d="M400,1164 L700,1164 L650,1100 L500,1080 L420,1120 Z" class="water"/>

  <!-- Main land mass -->
  <path d="M100,50 L1150,50 L1150,600 L1100,650 L1050,700 L1000,800 L950,900 L900,950 L800,1000 L700,1050 L650,1100 L500,1080 L400,1100 L300,1000 L250,900 L200,800 L150,700 L100,600 Z" class="land"/>

  <!-- Mountain region (north) - Mt Chiliad area -->
  <polygon points="900,80 920,140 880,140" class="mountain"/>
  <polygon points="940,100 960,150 920,150" class="mountain"/>
  <polygon points="860,90 885,150 835,150" class="mountain"/>
  <polygon points="980,110 1000,160 960,160" class="mountain"/>
  <polygon points="1020,90 1050,160 990,160" class="mountain"/>
  <polygon points="850,120 870,170 830,170" class="mountain"/>
  <polygon points="950,70 980,140 920,140" class="mountain"/>

  <!-- Sandy Shores region -->
  <rect x="700" y="200" width="350" height="250" rx="4" fill="#1a1a2e" stroke="#39ff14" stroke-width="0.3" opacity="0.3"/>
  <!-- Sandy Shores lake -->
  <ellipse cx="850" cy="300" rx="80" ry="40" class="water"/>

  <!-- Paleto Bay region (north) -->
  <rect x="600" y="60" width="200" height="150" rx="4" fill="#1a1a2e" stroke="#39ff14" stroke-width="0.3" opacity="0.3"/>

  <!-- Downtown / City blocks -->
  <g opacity="0.7">
    <!-- Downtown blocks -->
    <rect x="300" y="600" width="40" height="30" class="building-block"/>
    <rect x="350" y="600" width="35" height="30" class="building-block"/>
    <rect x="395" y="600" width="45" height="30" class="building-block"/>
    <rect x="300" y="640" width="40" height="35" class="building-block"/>
    <rect x="350" y="640" width="35" height="35" class="building-block"/>
    <rect x="395" y="640" width="45" height="35" class="building-block"/>
    <rect x="300" y="685" width="40" height="30" class="building-block"/>
    <rect x="350" y="685" width="35" height="30" class="building-block"/>
    <rect x="395" y="685" width="45" height="30" class="building-block"/>
    <rect x="450" y="600" width="50" height="30" class="building-block"/>
    <rect x="450" y="640" width="50" height="35" class="building-block"/>
    <rect x="450" y="685" width="50" height="30" class="building-block"/>
    <rect x="300" y="725" width="40" height="30" class="building-block"/>
    <rect x="350" y="725" width="35" height="30" class="building-block"/>
    <rect x="395" y="725" width="45" height="30" class="building-block"/>
    <rect x="450" y="725" width="50" height="30" class="building-block"/>
  </g>

  <!-- Vinewood / Hollywood blocks -->
  <g opacity="0.6">
    <rect x="350" y="420" width="45" height="25" class="building-block"/>
    <rect x="400" y="420" width="40" height="25" class="building-block"/>
    <rect x="445" y="420" width="35" height="25" class="building-block"/>
    <rect x="350" y="455" width="45" height="30" class="building-block"/>
    <rect x="400" y="455" width="40" height="30" class="building-block"/>
    <rect x="445" y="455" width="35" height="30" class="building-block"/>
    <rect x="350" y="495" width="45" height="25" class="building-block"/>
    <rect x="400" y="495" width="40" height="25" class="building-block"/>
    <rect x="445" y="495" width="35" height="25" class="building-block"/>
  </g>

  <!-- Del Perro Beach blocks -->
  <g opacity="0.5">
    <rect x="150" y="700" width="35" height="25" class="building-block"/>
    <rect x="190" y="700" width="30" height="25" class="building-block"/>
    <rect x="150" y="735" width="35" height="20" class="building-block"/>
    <rect x="190" y="735" width="30" height="20" class="building-block"/>
    <rect x="230" y="700" width="30" height="25" class="building-block"/>
    <rect x="230" y="735" width="30" height="20" class="building-block"/>
  </g>

  <!-- Airport area -->
  <g opacity="0.5">
    <rect x="350" y="900" width="200" height="100" rx="4" fill="#1a1a2e" stroke="#39ff14" stroke-width="0.5" opacity="0.4"/>
    <!-- Runways -->
    <line x1="370" y1="920" x2="530" y2="920" stroke="#39ff14" stroke-width="1" opacity="0.5"/>
    <line x1="380" y1="970" x2="540" y2="970" stroke="#39ff14" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- === ROADS === -->
  <!-- Main highways -->
  <path d="M200,200 L200,1050" class="road-main"/>
  <path d="M500,80 L500,1050" class="road-main"/>
  <path d="M100,500 L1100,500" class="road-main"/>
  <path d="M100,800 L900,800" class="road-main"/>

  <!-- Highway connectors -->
  <path d="M200,200 L500,200" class="road"/>
  <path d="M500,200 L800,200" class="road"/>
  <path d="M200,350 L500,350" class="road"/>
  <path d="M500,350 L700,350" class="road"/>
  <path d="M300,500 L300,800" class="road"/>
  <path d="M400,500 L400,800" class="road"/>
  <path d="M600,200 L600,500" class="road"/>
  <path d="M700,200 L700,500" class="road"/>
  <path d="M800,200 L800,600" class="road"/>
  <path d="M600,500 L600,900" class="road"/>
  <path d="M700,500 L700,900" class="road"/>
  <path d="M200,600 L500,600" class="road"/>
  <path d="M200,700 L500,700" class="road"/>
  <path d="M500,600 L800,600" class="road"/>
  <path d="M500,700 L800,700" class="road"/>

  <!-- Curved coastal road -->
  <path d="M100,300 C120,400 130,500 140,600 C150,650 160,700 180,750 C200,800 250,900 300,1000" class="road" opacity="0.4"/>

  <!-- === REGION BORDERS === -->
  <path d="M280,380 L520,380 L520,580 L280,580 Z" class="region-border"/>
  <path d="M280,580 L520,580 L520,780 L280,780 Z" class="region-border"/>
  <path d="M120,650 L280,650 L280,820 L200,900 L120,820 Z" class="region-border"/>
  <path d="M320,860 L580,860 L580,1020 L320,1020 Z" class="region-border"/>
  <path d="M550,50 L850,50 L850,220 L550,220 Z" class="region-border"/>
  <path d="M650,220 L1100,220 L1100,480 L650,480 Z" class="region-border"/>
  <path d="M850,50 L1130,50 L1130,220 L850,220 Z" class="region-border"/>

  <!-- === DISTRICT LABELS === -->
  <text x="400" y="480" class="district-label-lg" filter="url(#textGlow)">VINEWOOD</text>
  <text x="400" y="500" class="district-label" opacity="0.6">Hills &amp; Entertainment</text>

  <text x="380" y="440" class="district-label" opacity="0.5">HOLLYWOOD</text>

  <text x="400" y="680" class="district-label-lg" filter="url(#textGlow)">DOWNTOWN</text>
  <text x="400" y="700" class="district-label" opacity="0.6">Los Santos</text>

  <text x="200" y="770" class="district-label-lg" filter="url(#textGlow)">DEL PERRO</text>
  <text x="200" y="790" class="district-label" opacity="0.6">Beach</text>

  <text x="450" y="940" class="district-label-lg" filter="url(#textGlow)">LS AIRPORT</text>
  <text x="450" y="960" class="district-label" opacity="0.6">LSIA</text>

  <text x="700" y="130" class="district-label-lg" filter="url(#textGlow)">PALETO BAY</text>
  <text x="700" y="150" class="district-label" opacity="0.6">Coastal Town</text>

  <text x="870" y="340" class="district-label-lg" filter="url(#textGlow)">SANDY SHORES</text>
  <text x="870" y="360" class="district-label" opacity="0.6">Desert Region</text>

  <text x="980" y="130" class="district-label-lg" filter="url(#textGlow)">MT. CHILIAD</text>
  <text x="980" y="150" class="district-label" opacity="0.6">Summit: 798m</text>

  <!-- POI dots -->
  <circle cx="400" cy="660" r="4" class="poi-dot" filter="url(#glow)"/>
  <circle cx="200" cy="750" r="4" class="poi-dot" filter="url(#glow)"/>
  <circle cx="450" cy="920" r="4" class="poi-dot" filter="url(#glow)"/>
  <circle cx="700" cy="110" r="4" class="poi-dot" filter="url(#glow)"/>
  <circle cx="870" cy="320" r="4" class="poi-dot" filter="url(#glow)"/>
  <circle cx="970" cy="110" r="4" class="poi-dot" filter="url(#glow)"/>
  <circle cx="400" cy="460" r="4" class="poi-dot" filter="url(#glow)"/>

  <!-- Title -->
  <text x="600" y="1150" font-family="'Courier New', monospace" font-size="12" fill="#39ff14" text-anchor="middle" opacity="0.5">LOS SANTOS -- SAN ANDREAS -- INTERACTIVE MAP</text>

  <!-- Compass -->
  <g transform="translate(1100, 1100)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#39ff14" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="-12" font-family="'Courier New', monospace" font-size="10" fill="#39ff14" text-anchor="middle" opacity="0.6">N</text>
    <text x="0" y="18" font-family="'Courier New', monospace" font-size="8" fill="#39ff14" text-anchor="middle" opacity="0.4">S</text>
    <text x="14" y="4" font-family="'Courier New', monospace" font-size="8" fill="#39ff14" text-anchor="middle" opacity="0.4">E</text>
    <text x="-14" y="4" font-family="'Courier New', monospace" font-size="8" fill="#39ff14" text-anchor="middle" opacity="0.4">W</text>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#39ff14" stroke-width="1" opacity="0.5"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#39ff14" stroke-width="1" opacity="0.5"/>
  </g>
</svg>