<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 2048" width="2048" height="2048">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .poi { font-family: 'Courier New', monospace; font-size: 20px; fill: #fff; text-anchor: middle; font-weight: bold; }
      .sub { font-family: 'Courier New', monospace; font-size: 13px; fill: #c89b3c; text-anchor: middle; }
      .lane { stroke: #c89b3c; stroke-width: 6; fill: none; opacity: 0.3; }
      .turret { fill: #c89b3c; opacity: 0.5; }
      .jungle { fill: #1a3a1a; opacity: 0.3; }
      .river { stroke: #2266aa; stroke-width: 12; fill: none; opacity: 0.25; }
      .base-blue { fill: #1a3aff; opacity: 0.08; stroke: #3355ff; stroke-width: 2; stroke-opacity: 0.3; }
      .base-red { fill: #ff1a1a; opacity: 0.08; stroke: #ff3333; stroke-width: 2; stroke-opacity: 0.3; }
      .objective { fill: #c89b3c; opacity: 0.12; stroke: #c89b3c; stroke-width: 2; stroke-opacity: 0.4; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="2048" height="2048" fill="#0a0f0a"/>

  <!-- Jungle areas -->
  <rect x="300" y="300" width="1448" height="1448" rx="40" class="jungle"/>

  <!-- River (diagonal) -->
  <path d="M 300,1748 Q 700,1200 1024,1024 Q 1348,848 1748,300" class="river"/>

  <!-- Lanes -->
  <!-- Top lane -->
  <path d="M 350,1700 L 350,350 L 1700,350" class="lane"/>
  <!-- Bot lane -->
  <path d="M 350,1700 L 1700,1700 L 1700,350" class="lane"/>
  <!-- Mid lane -->
  <path d="M 350,1700 L 1700,350" class="lane"/>

  <!-- Blue base (bottom-left) -->
  <circle cx="350" cy="1700" r="150" class="base-blue"/>
  <text x="350" y="1690" class="poi" fill="#5588ff" filter="url(#glow)">BLUE</text>
  <text x="350" y="1715" class="sub" fill="#5588ff">Nexus</text>

  <!-- Red base (top-right) -->
  <circle cx="1700" cy="350" r="150" class="base-red"/>
  <text x="1700" y="340" class="poi" fill="#ff5555" filter="url(#glow)">RED</text>
  <text x="1700" y="365" class="sub" fill="#ff5555">Nexus</text>

  <!-- Baron pit -->
  <circle cx="470" cy="580" r="80" class="objective"/>
  <text x="470" y="575" class="poi" filter="url(#glow)">Baron</text>
  <text x="470" y="600" class="sub">Spawns 20:00</text>

  <!-- Dragon pit -->
  <circle cx="1580" cy="1470" r="80" class="objective"/>
  <text x="1580" y="1465" class="poi" filter="url(#glow)">Dragon</text>
  <text x="1580" y="1490" class="sub">Elemental</text>

  <!-- Blue buff (blue side) -->
  <circle cx="500" cy="1200" r="40" fill="#3366ff" opacity="0.15" stroke="#3366ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="500" y="1197" font-family="'Courier New', monospace" font-size="13" fill="#6699ff" text-anchor="middle">Blue</text>

  <!-- Red buff (blue side) -->
  <circle cx="800" cy="1500" r="40" fill="#ff3333" opacity="0.15" stroke="#ff3333" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="800" y="1497" font-family="'Courier New', monospace" font-size="13" fill="#ff6666" text-anchor="middle">Red</text>

  <!-- Blue buff (red side) -->
  <circle cx="1550" cy="850" r="40" fill="#3366ff" opacity="0.15" stroke="#3366ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="1550" y="847" font-family="'Courier New', monospace" font-size="13" fill="#6699ff" text-anchor="middle">Blue</text>

  <!-- Red buff (red side) -->
  <circle cx="1250" cy="550" r="40" fill="#ff3333" opacity="0.15" stroke="#ff3333" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="1250" y="547" font-family="'Courier New', monospace" font-size="13" fill="#ff6666" text-anchor="middle">Red</text>

  <!-- Lane labels -->
  <text x="350" y="1000" class="sub" transform="rotate(-90, 350, 1000)">TOP LANE</text>
  <text x="1024" y="1750" class="sub">BOT LANE</text>
  <text x="900" y="1120" class="sub" transform="rotate(-45, 900, 1120)">MID LANE</text>

  <!-- Title -->
  <text x="1024" y="120" font-family="'Courier New', monospace" font-size="40" fill="#c89b3c" text-anchor="middle" font-weight="bold" filter="url(#glow)">SUMMONER'S RIFT</text>
  <text x="1024" y="160" font-family="'Courier New', monospace" font-size="18" fill="#666" text-anchor="middle">LEAGUE OF LEGENDS — Classic 5v5</text>
</svg>
