<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400" width="1200" height="1400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .region-label { font-family: 'Georgia', serif; font-size: 16px; fill: #d4a017; text-anchor: middle; font-weight: bold; letter-spacing: 2px; }
      .region-sublabel { font-family: 'Georgia', serif; font-size: 11px; fill: #a08030; text-anchor: middle; font-style: italic; }
      .region-border { stroke: #d4a017; stroke-width: 1.5; fill: none; opacity: 0.35; stroke-dasharray: 6,3; }
      .region-fill { opacity: 0.08; }
      .grace-site { fill: #d4a017; }
      .legacy-dungeon { fill: none; stroke: #d4a017; stroke-width: 1.5; }
      .path-line { stroke: #554422; stroke-width: 1.5; fill: none; opacity: 0.4; }
      .water { fill: #1a3050; opacity: 0.4; }
      .mountain { fill: none; stroke: #444455; stroke-width: 1; opacity: 0.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1400" fill="#0a0a0f"/>

  <!-- Subtle vignette effect -->
  <radialGradient id="vignette" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#0a0a0f" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="1200" height="1400" fill="url(#vignette)"/>

  <!-- Outer ornate border -->
  <rect x="30" y="30" width="1140" height="1340" rx="8" ry="8" fill="none" stroke="#d4a017" stroke-width="1.5" opacity="0.4"/>
  <rect x="36" y="36" width="1128" height="1328" rx="6" ry="6" fill="none" stroke="#d4a017" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner ornaments -->
  <g stroke="#d4a017" stroke-width="1" opacity="0.4" fill="none">
    <path d="M50,50 L80,50 M50,50 L50,80"/>
    <path d="M1150,50 L1120,50 M1150,50 L1150,80"/>
    <path d="M50,1350 L80,1350 M50,1350 L50,1320"/>
    <path d="M1150,1350 L1120,1350 M1150,1350 L1150,1320"/>
  </g>

  <!-- === REGION: Mountaintops of the Giants (top) === -->
  <path d="M300,80 C400,60 600,50 750,70 C850,90 900,120 920,160 C940,220 900,280 850,320 C780,370 650,380 550,370 C420,360 340,320 300,260 C260,200 270,120 300,80 Z" class="region-border"/>
  <path d="M300,80 C400,60 600,50 750,70 C850,90 900,120 920,160 C940,220 900,280 850,320 C780,370 650,380 550,370 C420,360 340,320 300,260 C260,200 270,120 300,80 Z" fill="#2a2a3a" class="region-fill"/>
  <!-- Snow mountains -->
  <polygon points="400,120 420,170 380,170" class="mountain"/>
  <polygon points="500,100 525,160 475,160" class="mountain"/>
  <polygon points="650,90 680,155 620,155" class="mountain"/>
  <polygon points="780,110 800,165 760,165" class="mountain"/>
  <text x="600" y="210" class="region-label" filter="url(#goldGlow)">MOUNTAINTOPS</text>
  <text x="600" y="230" class="region-sublabel">of the Giants</text>

  <!-- === REGION: Consecrated Snowfield (top-left) === -->
  <path d="M100,100 C150,70 220,60 280,80 C300,120 270,200 240,250 C200,300 150,310 120,280 C80,240 70,170 100,100 Z" class="region-border"/>
  <path d="M100,100 C150,70 220,60 280,80 C300,120 270,200 240,250 C200,300 150,310 120,280 C80,240 70,170 100,100 Z" fill="#2a2a3a" class="region-fill"/>
  <text x="190" y="180" class="region-label" filter="url(#goldGlow)" font-size="12">CONSECRATED</text>
  <text x="190" y="198" class="region-sublabel">Snowfield</text>

  <!-- === REGION: Altus Plateau (center-upper) === -->
  <path d="M250,350 C350,320 500,310 650,330 C750,350 800,400 800,470 C800,540 750,600 680,630 C600,660 480,670 380,650 C300,630 240,580 230,510 C220,440 230,380 250,350 Z" class="region-border"/>
  <path d="M250,350 C350,320 500,310 650,330 C750,350 800,400 800,470 C800,540 750,600 680,630 C600,660 480,670 380,650 C300,630 240,580 230,510 C220,440 230,380 250,350 Z" fill="#2a3a1a" class="region-fill"/>
  <text x="520" y="480" class="region-label" filter="url(#goldGlow)">ALTUS PLATEAU</text>
  <text x="520" y="500" class="region-sublabel">The Golden Lands</text>

  <!-- === REGION: Leyndell Royal Capital (center of Altus) === -->
  <path d="M450,400 C500,390 560,395 590,420 C620,450 620,500 590,530 C560,560 500,565 460,540 C420,510 410,460 430,430 C440,410 445,405 450,400 Z" class="region-border" stroke-dasharray="none" stroke-width="2"/>
  <path d="M450,400 C500,390 560,395 590,420 C620,450 620,500 590,530 C560,560 500,565 460,540 C420,510 410,460 430,430 C440,410 445,405 450,400 Z" fill="#3a3a1a" class="region-fill" opacity="0.15"/>
  <!-- Castle icon -->
  <g transform="translate(520, 455)" stroke="#d4a017" stroke-width="1.2" fill="none" opacity="0.6">
    <rect x="-10" y="-8" width="20" height="16" rx="1"/>
    <rect x="-4" y="-14" width="8" height="6" rx="1"/>
    <line x1="-10" y1="-8" x2="-14" y2="-12"/>
    <line x1="10" y1="-8" x2="14" y2="-12"/>
  </g>
  <text x="520" y="440" class="region-label" filter="url(#goldGlow)" font-size="13">LEYNDELL</text>
  <text x="520" y="456" class="region-sublabel" font-size="9">Royal Capital</text>

  <!-- === REGION: Mt. Gelmir (left) === -->
  <path d="M100,350 C150,310 200,300 250,330 C270,380 260,440 240,490 C210,540 160,560 120,530 C80,490 70,420 100,350 Z" class="region-border"/>
  <path d="M100,350 C150,310 200,300 250,330 C270,380 260,440 240,490 C210,540 160,560 120,530 C80,490 70,420 100,350 Z" fill="#3a1a0a" class="region-fill"/>
  <!-- Volcano triangles -->
  <polygon points="170,380 190,430 150,430" fill="#3a1510" stroke="#d4a017" stroke-width="0.5" opacity="0.3"/>
  <text x="175" y="440" class="region-label" filter="url(#goldGlow)" font-size="13">MT. GELMIR</text>
  <text x="175" y="458" class="region-sublabel">Volcanic Peak</text>

  <!-- === REGION: Liurnia of the Lakes (center) === -->
  <path d="M200,580 C300,560 450,550 580,570 C680,590 750,640 780,720 C800,790 780,860 730,900 C660,950 540,970 420,960 C320,950 240,910 200,850 C160,780 160,700 170,640 C180,600 190,585 200,580 Z" class="region-border"/>
  <path d="M200,580 C300,560 450,550 580,570 C680,590 750,640 780,720 C800,790 780,860 730,900 C660,950 540,970 420,960 C320,950 240,910 200,850 C160,780 160,700 170,640 C180,600 190,585 200,580 Z" fill="#0a1a3a" class="region-fill"/>
  <!-- Lake elements -->
  <ellipse cx="450" cy="720" rx="100" ry="50" class="water"/>
  <ellipse cx="350" cy="780" rx="60" ry="30" class="water"/>
  <ellipse cx="550" cy="800" rx="50" ry="25" class="water"/>
  <text x="480" y="750" class="region-label" filter="url(#goldGlow)">LIURNIA</text>
  <text x="480" y="770" class="region-sublabel">of the Lakes</text>

  <!-- === REGION: Caelid (right) === -->
  <path d="M780,600 C850,580 930,590 1000,630 C1060,670 1100,740 1100,820 C1100,900 1060,960 1000,1000 C930,1040 850,1050 780,1020 C720,990 690,930 690,860 C690,780 720,680 750,640 C760,620 770,610 780,600 Z" class="region-border"/>
  <path d="M780,600 C850,580 930,590 1000,630 C1060,670 1100,740 1100,820 C1100,900 1060,960 1000,1000 C930,1040 850,1050 780,1020 C720,990 690,930 690,860 C690,780 720,680 750,640 C760,620 770,610 780,600 Z" fill="#3a0a0a" class="region-fill"/>
  <!-- Rot indicator -->
  <circle cx="880" cy="800" r="40" fill="#3a0a0a" opacity="0.3" stroke="#8b0000" stroke-width="0.5"/>
  <text x="880" y="800" class="region-label" filter="url(#goldGlow)">CAELID</text>
  <text x="880" y="820" class="region-sublabel">Scarlet Rot Wastes</text>

  <!-- === REGION: Limgrave (bottom-center) === -->
  <path d="M250,950 C350,920 500,910 620,930 C720,950 780,1000 800,1080 C820,1160 790,1240 730,1290 C660,1340 550,1360 430,1350 C320,1340 240,1290 200,1220 C160,1140 170,1060 200,1000 C220,960 235,950 250,950 Z" class="region-border"/>
  <path d="M250,950 C350,920 500,910 620,930 C720,950 780,1000 800,1080 C820,1160 790,1240 730,1290 C660,1340 550,1360 430,1350 C320,1340 240,1290 200,1220 C160,1140 170,1060 200,1000 C220,960 235,950 250,950 Z" fill="#1a2a0a" class="region-fill"/>
  <text x="500" y="1140" class="region-label" filter="url(#goldGlow)">LIMGRAVE</text>
  <text x="500" y="1160" class="region-sublabel">The Starting Lands</text>

  <!-- === PATHS between regions === -->
  <path d="M500,1100 L480,950 L480,770" class="path-line"/>
  <path d="M480,700 L520,600 L520,490" class="path-line"/>
  <path d="M520,470 L600,350 L600,250" class="path-line"/>
  <path d="M680,700 L780,720 L830,780" class="path-line"/>
  <path d="M250,480 L350,550 L400,650" class="path-line"/>
  <path d="M600,1080 L700,980 L780,900" class="path-line"/>

  <!-- === GRACE SITES (golden dots) === -->
  <g filter="url(#goldGlow)">
    <!-- Limgrave graces -->
    <circle cx="420" cy="1080" r="4" class="grace-site"/>
    <circle cx="550" cy="1050" r="4" class="grace-site"/>
    <circle cx="480" cy="1200" r="4" class="grace-site"/>
    <circle cx="350" cy="1150" r="4" class="grace-site"/>
    <circle cx="650" cy="1100" r="4" class="grace-site"/>
    <!-- Liurnia graces -->
    <circle cx="400" cy="680" r="4" class="grace-site"/>
    <circle cx="550" cy="650" r="4" class="grace-site"/>
    <circle cx="450" cy="850" r="4" class="grace-site"/>
    <circle cx="320" cy="750" r="4" class="grace-site"/>
    <!-- Altus graces -->
    <circle cx="500" cy="420" r="4" class="grace-site"/>
    <circle cx="620" cy="450" r="4" class="grace-site"/>
    <circle cx="400" cy="500" r="4" class="grace-site"/>
    <!-- Caelid graces -->
    <circle cx="830" cy="700" r="4" class="grace-site"/>
    <circle cx="950" cy="800" r="4" class="grace-site"/>
    <circle cx="870" cy="920" r="4" class="grace-site"/>
    <!-- Mt Gelmir graces -->
    <circle cx="170" cy="400" r="4" class="grace-site"/>
    <!-- Mountaintops graces -->
    <circle cx="550" cy="180" r="4" class="grace-site"/>
    <circle cx="700" cy="160" r="4" class="grace-site"/>
    <!-- Consecrated graces -->
    <circle cx="180" cy="160" r="4" class="grace-site"/>
  </g>

  <!-- === LEGACY DUNGEON markers === -->
  <!-- Stormveil Castle -->
  <g transform="translate(460, 1020)">
    <polygon points="0,-10 8,6 -8,6" class="legacy-dungeon" filter="url(#goldGlow)"/>
    <circle cx="0" cy="0" r="3" fill="#d4a017" opacity="0.6"/>
  </g>
  <text x="460" y="1005" font-family="'Georgia', serif" font-size="10" fill="#d4a017" text-anchor="middle" opacity="0.7">Stormveil Castle</text>

  <!-- Raya Lucaria -->
  <g transform="translate(500, 680)">
    <polygon points="0,-10 8,6 -8,6" class="legacy-dungeon" filter="url(#goldGlow)"/>
    <circle cx="0" cy="0" r="3" fill="#d4a017" opacity="0.6"/>
  </g>
  <text x="500" y="665" font-family="'Georgia', serif" font-size="10" fill="#d4a017" text-anchor="middle" opacity="0.7">Raya Lucaria Academy</text>

  <!-- Redmane Castle -->
  <g transform="translate(920, 950)">
    <polygon points="0,-10 8,6 -8,6" class="legacy-dungeon" filter="url(#goldGlow)"/>
    <circle cx="0" cy="0" r="3" fill="#d4a017" opacity="0.6"/>
  </g>
  <text x="920" y="935" font-family="'Georgia', serif" font-size="10" fill="#d4a017" text-anchor="middle" opacity="0.7">Redmane Castle</text>

  <!-- Volcano Manor -->
  <g transform="translate(160, 470)">
    <polygon points="0,-10 8,6 -8,6" class="legacy-dungeon" filter="url(#goldGlow)"/>
    <circle cx="0" cy="0" r="3" fill="#d4a017" opacity="0.6"/>
  </g>
  <text x="160" y="490" font-family="'Georgia', serif" font-size="10" fill="#d4a017" text-anchor="middle" opacity="0.7">Volcano Manor</text>

  <!-- Title -->
  <text x="600" y="1385" font-family="'Georgia', serif" font-size="11" fill="#d4a017" text-anchor="middle" opacity="0.4" letter-spacing="3">THE LANDS BETWEEN -- INTERACTIVE MAP</text>

  <!-- Erdtree glow (center-ish) -->
  <circle cx="520" cy="470" r="60" fill="#d4a017" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="520" cy="470" r="30" fill="#d4a017" opacity="0.05" filter="url(#softGlow)"/>
</svg>