<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="islandGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="70%" stop-color="#121a12"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <style>
      .poi-label { font-family: 'Courier New', monospace; font-size: 13px; fill: #ffffff; text-anchor: middle; font-weight: bold; }
      .poi-sublabel { font-family: 'Courier New', monospace; font-size: 10px; fill: #00d4ff; text-anchor: middle; }
      .terrain-forest { fill: #0a3a0a; opacity: 0.4; }
      .terrain-desert { fill: #3a2a0a; opacity: 0.3; }
      .terrain-snow { fill: #2a2a3a; opacity: 0.3; }
      .terrain-swamp { fill: #0a2a2a; opacity: 0.4; }
      .water-body { fill: #00d4ff; opacity: 0.15; }
      .road { stroke: #444460; stroke-width: 2; fill: none; opacity: 0.5; }
      .coast { stroke: #00d4ff; stroke-width: 2; fill: none; opacity: 0.4; }
      .poi-dot { fill: #00d4ff; }
      .grid-line { stroke: #222240; stroke-width: 0.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="#0a0a0f"/>

  <!-- Grid -->
  <g opacity="0.3">
    <line x1="120" y1="40" x2="120" y2="1160" class="grid-line"/>
    <line x1="240" y1="40" x2="240" y2="1160" class="grid-line"/>
    <line x1="360" y1="40" x2="360" y2="1160" class="grid-line"/>
    <line x1="480" y1="40" x2="480" y2="1160" class="grid-line"/>
    <line x1="600" y1="40" x2="600" y2="1160" class="grid-line"/>
    <line x1="720" y1="40" x2="720" y2="1160" class="grid-line"/>
    <line x1="840" y1="40" x2="840" y2="1160" class="grid-line"/>
    <line x1="960" y1="40" x2="960" y2="1160" class="grid-line"/>
    <line x1="1080" y1="40" x2="1080" y2="1160" class="grid-line"/>
    <line x1="40" y1="120" x2="1160" y2="120" class="grid-line"/>
    <line x1="40" y1="240" x2="1160" y2="240" class="grid-line"/>
    <line x1="40" y1="360" x2="1160" y2="360" class="grid-line"/>
    <line x1="40" y1="480" x2="1160" y2="480" class="grid-line"/>
    <line x1="40" y1="600" x2="1160" y2="600" class="grid-line"/>
    <line x1="40" y1="720" x2="1160" y2="720" class="grid-line"/>
    <line x1="40" y1="840" x2="1160" y2="840" class="grid-line"/>
    <line x1="40" y1="960" x2="1160" y2="960" class="grid-line"/>
    <line x1="40" y1="1080" x2="1160" y2="1080" class="grid-line"/>
  </g>

  <!-- Grid labels -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#444460" text-anchor="middle">
    <text x="60" y="55">A</text><text x="180" y="55">B</text><text x="300" y="55">C</text>
    <text x="420" y="55">D</text><text x="540" y="55">E</text><text x="660" y="55">F</text>
    <text x="780" y="55">G</text><text x="900" y="55">H</text><text x="1020" y="55">I</text><text x="1140" y="55">J</text>
    <text x="30" y="185">1</text><text x="30" y="305">2</text><text x="30" y="425">3</text>
    <text x="30" y="545">4</text><text x="30" y="665">5</text><text x="30" y="785">6</text>
    <text x="30" y="905">7</text><text x="30" y="1025">8</text><text x="30" y="1145">9</text>
  </g>

  <!-- Island shape -->
  <path d="M300,100 C400,80 550,90 700,100 C850,110 950,150 1020,220 C1080,300 1100,400 1100,500 C1100,620 1080,720 1020,820 C960,900 900,960 820,1010 C740,1060 650,1090 550,1100 C440,1100 350,1080 270,1030 C190,970 140,900 110,800 C80,700 80,580 100,470 C120,360 160,260 220,180 C260,130 280,110 300,100 Z" fill="url(#islandGrad)" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>

  <!-- Coastline detail -->
  <path d="M300,100 C400,80 550,90 700,100 C850,110 950,150 1020,220 C1080,300 1100,400 1100,500 C1100,620 1080,720 1020,820 C960,900 900,960 820,1010 C740,1060 650,1090 550,1100 C440,1100 350,1080 270,1030 C190,970 140,900 110,800 C80,700 80,580 100,470 C120,360 160,260 220,180 C260,130 280,110 300,100 Z" class="coast"/>

  <!-- Terrain zones -->
  <!-- Forest (center-north) -->
  <ellipse cx="450" cy="350" rx="150" ry="100" class="terrain-forest"/>
  <!-- Forest (east) -->
  <ellipse cx="850" cy="500" rx="120" ry="130" class="terrain-forest"/>
  <!-- Desert (southwest) -->
  <ellipse cx="250" cy="800" rx="100" ry="120" class="terrain-desert"/>
  <!-- Snow (northwest) -->
  <ellipse cx="300" cy="200" rx="100" ry="80" class="terrain-snow"/>
  <!-- Swamp (south) -->
  <ellipse cx="450" cy="900" rx="130" ry="80" class="terrain-swamp"/>

  <!-- Water bodies -->
  <ellipse cx="600" cy="700" rx="60" ry="40" class="water-body"/>
  <ellipse cx="350" cy="600" rx="40" ry="25" class="water-body"/>
  <ellipse cx="800" cy="350" rx="35" ry="20" class="water-body"/>

  <!-- Roads connecting POIs -->
  <path d="M350,300 L550,450 L750,400" class="road"/>
  <path d="M550,450 L600,650 L500,850" class="road"/>
  <path d="M350,300 L300,500 L350,700" class="road"/>
  <path d="M750,400 L850,550 L800,750" class="road"/>
  <path d="M600,650 L800,750" class="road"/>
  <path d="M350,700 L500,850" class="road"/>
  <path d="M850,550 L950,350" class="road"/>

  <!-- Storm circle -->
  <circle cx="580" cy="550" r="350" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="12,6" opacity="0.4"/>
  <circle cx="580" cy="550" r="200" fill="none" stroke="#a855f7" stroke-width="1" stroke-dasharray="8,4" opacity="0.25"/>

  <!-- === POI Markers === -->
  <!-- Pleasant Park -->
  <g>
    <circle cx="350" cy="300" r="6" class="poi-dot" filter="url(#glow)"/>
    <circle cx="350" cy="300" r="12" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <text x="350" y="280" class="poi-label" filter="url(#textGlow)">PLEASANT PARK</text>
    <text x="350" y="322" class="poi-sublabel">Suburban Area</text>
  </g>

  <!-- Tilted Towers -->
  <g>
    <circle cx="550" cy="450" r="6" class="poi-dot" filter="url(#glow)"/>
    <circle cx="550" cy="450" r="14" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.5"/>
    <text x="550" y="430" class="poi-label" filter="url(#textGlow)">TILTED TOWERS</text>
    <text x="550" y="472" class="poi-sublabel">Hot Drop Zone</text>
  </g>

  <!-- Retail Row -->
  <g>
    <circle cx="750" cy="400" r="6" class="poi-dot" filter="url(#glow)"/>
    <circle cx="750" cy="400" r="12" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <text x="750" y="380" class="poi-label" filter="url(#textGlow)">RETAIL ROW</text>
    <text x="750" y="422" class="poi-sublabel">Shopping District</text>
  </g>

  <!-- Lazy Lake -->
  <g>
    <circle cx="600" cy="650" r="6" class="poi-dot" filter="url(#glow)"/>
    <circle cx="600" cy="650" r="12" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <text x="600" y="630" class="poi-label" filter="url(#textGlow)">LAZY LAKE</text>
    <text x="600" y="672" class="poi-sublabel">Lakeside Town</text>
  </g>

  <!-- Misty Meadows -->
  <g>
    <circle cx="500" cy="850" r="6" class="poi-dot" filter="url(#glow)"/>
    <circle cx="500" cy="850" r="12" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <text x="500" y="830" class="poi-label" filter="url(#textGlow)">MISTY MEADOWS</text>
    <text x="500" y="872" class="poi-sublabel">Valley Village</text>
  </g>

  <!-- Slurpy Swamp -->
  <g>
    <circle cx="350" cy="750" r="6" class="poi-dot" filter="url(#glow)"/>
    <circle cx="350" cy="750" r="12" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <text x="350" y="730" class="poi-label" filter="url(#textGlow)">SLURPY SWAMP</text>
    <text x="350" y="772" class="poi-sublabel">Toxic Wetlands</text>
  </g>

  <!-- Dirty Docks -->
  <g>
    <circle cx="950" cy="350" r="6" class="poi-dot" filter="url(#glow)"/>
    <circle cx="950" cy="350" r="12" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <text x="950" y="330" class="poi-label" filter="url(#textGlow)">DIRTY DOCKS</text>
    <text x="950" y="372" class="poi-sublabel">Industrial Port</text>
  </g>

  <!-- Steamy Stacks -->
  <g>
    <circle cx="850" cy="220" r="6" class="poi-dot" filter="url(#glow)"/>
    <circle cx="850" cy="220" r="12" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <text x="850" y="200" class="poi-label" filter="url(#textGlow)">STEAMY STACKS</text>
    <text x="850" y="242" class="poi-sublabel">Power Plant</text>
  </g>

  <!-- Catty Corner -->
  <g>
    <circle cx="800" cy="750" r="6" class="poi-dot" filter="url(#glow)"/>
    <circle cx="800" cy="750" r="12" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <text x="800" y="730" class="poi-label" filter="url(#textGlow)">CATTY CORNER</text>
    <text x="800" y="772" class="poi-sublabel">Mountain Base</text>
  </g>

  <!-- Outer border -->
  <rect x="20" y="20" width="1160" height="1160" rx="16" ry="16" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5" filter="url(#glow)"/>

  <!-- Title bar -->
  <text x="600" y="1150" font-family="'Courier New', monospace" font-size="12" fill="#00d4ff" text-anchor="middle" opacity="0.5">BATTLE ROYALE ISLAND -- STORM TRACKER -- INTERACTIVE MAP</text>

  <!-- Storm indicator legend -->
  <g transform="translate(1050, 1080)">
    <circle cx="0" cy="0" r="6" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="14" y="4" font-family="'Courier New', monospace" font-size="9" fill="#a855f7" opacity="0.7">STORM</text>
  </g>
</svg>